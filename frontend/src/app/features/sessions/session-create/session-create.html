<h2>Create Session</h2>

@if (errorMessage) {
  <p class="error">{{ errorMessage }}</p>
}

<form (ngSubmit)="createSession()">

  <div>
    <label>Title</label>
    <input type="text" name="title" [(ngModel)]="sessionData.title" required>
  </div>

  <div>
    <label>Description</label>
    <textarea name="description" [(ngModel)]="sessionData.description" required></textarea>
  </div>

  <div>
    <label>Start time</label>
    <input type="datetime-local" name="startTime" [(ngModel)]="sessionData.startTime" required>
  </div>
  <div>
    <label>End time</label>
    <input type="datetime-local" name="endTime" [(ngModel)]="sessionData.endTime" required>
  </div>
  <button type="submit">Create</button>
</form>

<a [routerLink]="['/events', eventId, 'sessions']">Back to sessions</a>
