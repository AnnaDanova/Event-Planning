<section class="page">
  <form class="form-card" (ngSubmit)="createTemplate()">

    <h2>Създаване на шаблон за известие</h2>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <div class="form-group">
      <label>Съобщение</label>
      <textarea name="message" [(ngModel)]="templateData.message" required></textarea>
    </div>

    <div class="form-group">
      <label>Дата и час на изпращане</label>
      <input type="datetime-local" name="scheduledAt" [(ngModel)]="templateData.scheduledAt" required>
    </div>

    <div class="form-group">
      <label>Тип</label>
      <select name="type" [(ngModel)]="templateData.type" required>
        <option value="EVENT_REMINDER">Предстоящо събитие</option>
        <option value="SESSION_STARTING">Сесията започва скоро</option>
        <option value="SPEAKER_BRIEFING">Напомняне за лектор</option>
        <option value="SCHEDULE_CHANGED">Промяна в програмата</option>
        <option value="EVENT_CANCELLED">Отмяна на събитие</option>
        <option value="TICKET_CONFIRMED">Успешна покупка на билет</option>
        <option value="PAYMENT_FAILED">Проблем с плащането</option>
        <option value="FEEDBACK_REQUEST">Вашето мнение е важно за нас</option>
      </select>
    </div>

    <div class="actions">
      <button type="submit">Създаване</button>
      <a class="btn btn-secondary" [routerLink]="['/events', eventId, 'notification-templates']">
        Назад
      </a>
    </div>

  </form>
</section>
