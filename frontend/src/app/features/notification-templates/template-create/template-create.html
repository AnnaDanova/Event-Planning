<h2>Create Notification Template</h2>
@if (errorMessage) {
  <p class="error">{{ errorMessage }}</p>
}
<form (ngSubmit)="createTemplate()">
  <div>
    <label>Message</label>
    <textarea name="message" [(ngModel)]="templateData.message" required></textarea>
  </div>
  <div>
    <label>Scheduled at</label>
    <input type="datetime-local" name="scheduledAt" [(ngModel)]="templateData.scheduledAt" required>
  </div>
  <div>
    <label>Type</label>
    <select name="type" [(ngModel)]="templateData.type" required>
      <option value="EVENT_REMINDER">Event reminder</option>
      <option value="SESSION_STARTING">SessionService starting</option>
      <option value="SPEAKER_BRIEFING">Speaker briefing</option>
      <option value="SCHEDULE_CHANGED">Schedule changed</option>
      <option value="EVENT_CANCELLED">Event cancelled</option>
      <option value="TICKET_CONFIRMED">Ticket confirmed</option>
      <option value="PAYMENT_FAILED">Payment failed</option>
      <option value="FEEDBACK_REQUEST">Feedback request</option>
    </select>
  </div>
  <button type="submit">Create</button>
</form>
<a [routerLink]="['/events', eventId, 'notification-templates']"> Back to templates</a>
