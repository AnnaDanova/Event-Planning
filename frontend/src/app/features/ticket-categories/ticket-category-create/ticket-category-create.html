<div class="container mt-5">
  <h2 class="mb-4">Добави категория билети</h2>

  @if (successMessage()) {
    <div class="alert alert-success">
      {{ successMessage() }}
    </div>
  }

  @if (errorMessage()) {
    <div class="alert alert-danger">
      {{ errorMessage() }}
    </div>
  }

  <form (ngSubmit)="createCategory()">

    <div class="mb-3">
      <label class="form-label">Име на категория</label>
      <input
        class="form-control"
        [(ngModel)]="category.name"
        name="name"
        required>
    </div>

    <div class="mb-3">
      <label class="form-label">Количество билети</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="category.quantity"
        name="quantity"
        required
        min="1">
    </div>

    <div class="mb-3">
      <label class="form-label">Цена</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="category.price"
        name="price"
        required
        min="0"
        step="0.01">
    </div>

    <button type="submit" class="btn btn-primary">
      Добави категория
    </button>

  </form>

  <div class="mt-3">
    <button
      type="button"
      class="btn btn-success"
      (click)="finish()">
      Завърши създаването
    </button>
  </div>

</div>
