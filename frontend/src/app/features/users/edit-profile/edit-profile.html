<h2>Edit Profile</h2>

<p style="color: green">{{ successMessage }}</p>
<p style="color: red">{{ errorMessage }}</p>

<form (ngSubmit)="updateProfile()">
  <div>
    <label>Email</label>
    <input type="email" name="email" [(ngModel)]="updateData().email" required>
  </div>
  <div>
    <label>Address</label>
    <input type="text" name="address" [(ngModel)]="updateData().address">
  </div>
  <div>
    <label>Profile photo URL</label>
    <input type="text" name="profilePhoto" [(ngModel)]="updateData().profilePhoto">
  </div>
  <button type="submit">Save changes</button>
</form>
<br>
<a routerLink="/profile">Back to profile</a>
