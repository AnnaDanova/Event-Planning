<h2>Редактиране на профила</h2>

<p style="color: green">{{ successMessage }}</p>
<p style="color: red">{{ errorMessage }}</p>

<form (ngSubmit)="updateProfile()">
  <div>
    <label for="lastName">Фамилия: </label>
    <input id="lastName" name="lastName" type="text" [(ngModel)]="updateData().lastName" required/>
  </div>
  <div>
    <label for="bio">Описание/За мен: </label>
    <textarea id="bio" name="bio" [(ngModel)]="updateData().bio" rows="4"></textarea>
  </div>
  <div>
    <label>Имейл: </label>
    <input type="email" name="email" [(ngModel)]="updateData().email" required>
  </div>
  <div>
    <label>Населено място: </label>
    <input type="text" name="address" [(ngModel)]="updateData().address">
  </div>
  <div>
    <label for="profilePhotoFile">Профилна снимка</label>
    <input id="profilePhotoFile" type="file" accept="image/*" (change)="onFileSelected($event)"/>
    @if (updateData().profilePhoto) {
      <div>
        <img [src]="'http://localhost:8080' + updateData().profilePhoto" alt="Профилна снимка" width="120"/>
      </div>
    }
  </div>
  <button type="submit">Запазване на промените</button>
</form>
<br>
<a routerLink="/profile">Назад към профила</a>
