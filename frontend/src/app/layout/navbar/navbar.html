<nav class="navbar">
  <div>
    <h2>Evently</h2>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Търси събития"/>
    <span class="divider"></span>
    <input type="text" placeholder="Град"/>
    <button type="button">Търси</button>
  </div>

  <div class="links">
    <a routerLink="/">Начало</a>
    <a routerLink="/events">Събития</a>
    @if (authService.loggedUser()) {
      <a routerLink="/my-events">Моите събития</a>
      <a routerLink="/events/create">Създай събитие</a>
      <a routerLink="/notifications">Известия</a>
      <a routerLink="/profile">Профил</a>
      <button type="button" class="logout-btn" (click)="logout()">Изход</button>
    } @else {
      <a routerLink="/login">Вход</a>
      <a routerLink="/register">Регистрация</a>
    }
  </div>
</nav>
